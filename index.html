        <h1>Sander Riedberg</h1>
        <p>Technology &amp; Regulatory Quality. Based in Nacka, Stockholm, Sweden.</p>
        <h2>Who</h2>
        <p>
          Sander has worked where medical technology meets the rules that
          keep it honest since 2016: regulatory strategy, quality systems,
          ISO 13485, PRRC duties, EU MDR, and lately the EU AI Act. The
          work he loves has many dimensions and no given answer. He grew
          up European - a German-Estonian father, a Finnish mother,
          childhood years in Finland and Belgium, a second home in Spain
          through his wife's family.
        </p>
        <h2>What he stands for</h2>
        <p>
          Leave it better: medical technology as a way to make care
          genuinely safer. Beauty is not optional. All of us, human -
          values formed by scouting summers in the Stockholm archipelago
          and years in KFUM Sweden (the YMCA), including a term as vice
          chair of the national board. The most important things in his
          life are not on this website; they are at home.
        </p>
        <h2>Projects</h2>
        <p>
          Midnight Pigeon - a lightweight macOS client for Messenger.
          Gatlykta (gatlykta.riedberg.se) - a browser game for learning
          the street names of central Stockholm. And this website, which
          knows it is a website: built by Claude (Fable 5) in June 2026,
          with a self-aware mode below the waterline.
        </p>
        <p>Blog: <a href="https://blog.riedberg.se/">blog.riedberg.se</a> ·
           LinkedIn: <a href="https://www.linkedin.com/in/sander-riedberg/">linkedin.com/in/sander-riedberg</a></p>
